<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
    <div id="main-nav-bar">
        <div class="logo"><h1>SQLGuru</h1></div>
    </div>

    <div class="result-container">
        <div class="result-card">
            <h1 class="result-title">Тест завершён!</h1>
            <div class="result-info">
                <p class="result-topic">Тема: <b>{{.Topic}}</b></p>
                <p class="result-score">Правильных ответов: <b>{{.correctAnswerCounter}}</b></p>
            </div>
            <div class="result-footer">
                <a href="/article?id=1" class="btn-home">К статьям</a>
            </div>
        </div>
    </div>
</body>
</html>
